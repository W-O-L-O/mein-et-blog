<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js" integrity="sha384-h7m96uR8f5Y4D9uA+n9uL1f9vW1B9vW1B9vW1B9vW1B9vW1B9vW1B9vW1B9vW1B" crossorigin="anonymous"></script>

<script>

        renderMathInElement(document.body, {

                {left: "$", right: "$", display: false}

        });
    });
</script>
